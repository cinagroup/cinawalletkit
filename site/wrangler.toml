#:schema node_modules/wrangler/config-schema.json
name = "cinawalletkit-site"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
account_id = "7ea8e46d8210bad342fa7595f7935fea"

# Stub out WebSocket module - not needed in Workers environment
[alias]
isows = "./stubs/empty.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = ["/_next/*", "/favicon.ico", "/llms.txt", "/llms-full.txt"]

[observability]
enabled = true

# KV namespace for ISR cache (create later in Cloudflare Dashboard)
# [[kv_namespaces]]
# binding = "CACHE_KV"
# id = ""
# preview_id = ""

# Production environment
[env.production]
name = "cinawalletkit-site-production"
workers_dev = true
routes = [
  { pattern = "cinacoin.com/*", zone_name = "cinacoin.com" },
  { pattern = "www.cinacoin.com/*", zone_name = "cinacoin.com" }
]

# Preview environment (for PR previews)
[env.preview]
name = "cinawalletkit-site-preview"
