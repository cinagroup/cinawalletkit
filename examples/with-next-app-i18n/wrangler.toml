name = "cinawalletkit-with-next-app-i18n"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = true

routes = [{ pattern = "next-app-i18n.cinacoin.com/*", zone_name = "cinacoin.com" }]
