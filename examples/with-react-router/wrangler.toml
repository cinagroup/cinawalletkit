name = "cinawalletkit-with-react-router"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
main = "worker.js"
workers_dev = true

routes = [{ pattern = "react-router.cinacoin.com/*", zone_name = "cinacoin.com" }]

[assets]
directory = "build/client"
binding = "ASSETS"
run_worker_first = true

[observability]
enabled = true
