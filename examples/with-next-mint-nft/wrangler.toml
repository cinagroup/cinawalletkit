name = "cinawalletkit-with-next-mint-nft"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = true

routes = [{ pattern = "next-mint-nft.cinacoin.com/*", zone_name = "cinacoin.com" }]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = true
